# MCP backend tool server (server-everything via Node.js).
# The gateway cluster routes "everything" tool calls to this deployment.
#
# NOTE: npx downloads the package on first run; the readiness probe has a
# generous initialDelaySeconds to account for cold image pulls and download
# time. Increase it further on slow networks.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-everything
  labels:
    app: mcp-everything
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-everything
  template:
    metadata:
      labels:
        app: mcp-everything
    spec:
      containers:
        - name: mcp-everything
          image: node:22-alpine
          command:
            - npx
            - -y
            - "@modelcontextprotocol/server-everything"
            - streamableHttp
          env:
            - name: PORT
              value: "3001"
          ports:
            - containerPort: 3001
              name: mcp
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            tcpSocket:
              port: mcp
            initialDelaySeconds: 45
            periodSeconds: 5
            failureThreshold: 10
---
# ClusterIP service for the MCP tool server.
apiVersion: v1
kind: Service
metadata:
  name: mcp-everything
  labels:
    app: mcp-everything
spec:
  selector:
    app: mcp-everything
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 3001
      targetPort: mcp
      name: mcp
