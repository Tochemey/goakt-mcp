# Nginx ConfigMap — HTTP/1.1 reverse proxy for MCP Streamable HTTP.
#
# MCP Streamable HTTP uses long-lived SSE connections for server-push, so
# response buffering must be disabled and timeouts extended beyond the default.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {
      worker_connections 512;
    }
    http {
      sendfile        on;
      tcp_nopush      on;
      keepalive_timeout 120s;
      client_body_buffer_size 4k;
      client_max_body_size 1m;
      access_log off;
      error_log /var/log/nginx/error.log warn;

      upstream mcp_servers {
        # ip_hash routes all requests from the same client IP to the same pod,
        # which is required for MCP session affinity (sessions are node-local).
        ip_hash;
        server gateway-0.gateway.default.svc.cluster.local:8080;
        server gateway-1.gateway.default.svc.cluster.local:8080;
        server gateway-2.gateway.default.svc.cluster.local:8080;
        keepalive 64;
      }

      server {
        listen 80;

        location /health {
          proxy_pass http://mcp_servers;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
        }

        location / {
          proxy_pass         http://mcp_servers;
          proxy_http_version 1.1;

          # Required for MCP Streamable HTTP (SSE response streams).
          proxy_buffering    off;
          proxy_cache        off;
          proxy_read_timeout 300s;
          proxy_send_timeout 300s;

          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          # Required when upstream keepalive is enabled.
          proxy_set_header Connection        "";

          # Pass identity headers unchanged so IdentityResolver can read them.
          proxy_pass_header  X-Tenant-ID;
          proxy_pass_header  X-Client-ID;
        }
      }
    }
